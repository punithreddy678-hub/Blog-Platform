<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BlogSphere AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
        }

        .glass{
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center px-6">

<div class="glass max-w-md w-full rounded-3xl p-8">

    <h1 class="text-3xl font-bold text-center mb-3">
        Forgot Password
    </h1>

    <p class="text-center text-gray-400 mb-8">
        Enter your email and we'll send you a password reset link.
    </p>

    <form id="forgotPasswordForm" class="space-y-5">

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-purple-500">

        <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl font-semibold">
            Send Reset Link
        </button>

    </form>

    <div class="text-center mt-6">

        <a href="login.html"
           class="text-purple-400 hover:text-purple-300">
           Back to Login
        </a>

    </div>

</div>

<script>
document.getElementById('forgotPasswordForm')
.addEventListener('submit', function(e){

    e.preventDefault();

    alert('Password reset link sent successfully!');
});
</script>

</body>
</html>
