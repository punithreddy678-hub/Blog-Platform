<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - BlogSphere AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
        }

        .glass{
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center px-6">

<div class="glass max-w-lg w-full rounded-3xl p-10 text-center">

    <div class="w-24 h-24 bg-purple-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <span class="text-5xl">📧</span>
    </div>

    <h1 class="text-4xl font-bold mb-4">
        Verify Your Email
    </h1>

    <p class="text-gray-400 leading-relaxed">
        We've sent a verification link to your email address.
        Please check your inbox and click the verification link
        to activate your account.
    </p>

    <div class="bg-slate-900 rounded-2xl p-5 mt-8">

        <p class="text-sm text-gray-400">
            Didn't receive the email?
        </p>

        <button
            class="mt-4 bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl font-semibold">
            Resend Verification Email
        </button>

    </div>

    <a href="login.html"
       class="inline-block mt-8 bg-white text-black px-8 py-3 rounded-xl font-semibold">
       Go To Login
    </a>

</div>

</body>
</html>
