<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - BlogSphere AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
}
</style>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-slate-900 rounded-3xl p-8 shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-2">
        Welcome Back
    </h1>

    <p class="text-center text-gray-400 mb-8">
        Login to your account
    </p>

    <form id="loginForm" class="space-y-4">

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <div class="relative">

            <input
                type="password"
                id="password"
                placeholder="Password"
                class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

            <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-4 top-3">
                👁
            </button>

        </div>

        <div class="flex justify-between text-sm">

            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="forgot-password.html"
               class="text-purple-400">
                Forgot Password?
            </a>

        </div>

        <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-semibold">

            Login

        </button>

    </form>

    <div class="mt-6 text-center">

        <p class="text-gray-400">
            Don't have an account?
        </p>

        <a href="register.html"
           class="text-purple-400">
            Create Account
        </a>

    </div>

</div>

<script>
function togglePassword() {

    const password =
        document.getElementById("password");

    if(password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }

}

document
.getElementById("loginForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try {

        const response = await fetch(
            "https://blog-platform-hxpc.onrender.com",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            // Save Login Data

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data)
            );

            alert("Login Successful");

            window.location.href =
                "dashboard.html";

        }else{

            alert(data.message);

        }

    } catch(error){

        console.error(error);

        alert("Login Failed");

    }

});
</script>

</body>
</html>
