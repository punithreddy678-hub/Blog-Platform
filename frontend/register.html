<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - BlogSphere AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
}
</style>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-slate-900 rounded-3xl p-8 shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-2">
        Create Account
    </h1>

    <p class="text-center text-gray-400 mb-8">
        Join BlogSphere AI today
    </p>

    <form id="registerForm" class="space-y-4">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <select
            id="role"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

            <option value="user">User</option>
            <option value="author">Author</option>

        </select>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-semibold">

            Register

        </button>

    </form>

    <div class="mt-6 text-center">

        <a href="login.html"
           class="text-purple-400 hover:text-purple-300">
            Already have an account? Login
        </a>

    </div>

</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const name =
        document.getElementById("name").value;

    const email =
        document.getElementById("email").value;

    const role =
        document.getElementById("role").value;

    const password =
        document.getElementById("password").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){

        alert("Passwords do not match");
        return;

    }

    try {

        const response = await fetch(
            "https://blog-platform-hxpc.onrender.com/api/auth/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name,
                    email,
                    password,
                    role
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("Registration Successful!");

            localStorage.setItem(
                "user",
                JSON.stringify(data)
            );

            window.location.href =
                "login.html";

        } else {

            alert(data.message || "Registration failed");

        }

    } catch(error){

        console.error(error);

        alert("Server Error. Please try again.");

    }

});

</script>

</body>
</html>
