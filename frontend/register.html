<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - BlogSphere AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
}
</style>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md bg-slate-900 rounded-3xl p-8 shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-2">
        Create Account
    </h1>

    <p class="text-center text-gray-400 mb-8">
        Join BlogSphere AI today
    </p>

    <form id="registerForm" class="space-y-4">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <select
            id="role"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

            <option value="user">User</option>
            <option value="author">Author</option>

        </select>

        <input
            type="password"
            id="password"
            placeholder="Password"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">

        <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-semibold">

            Register

        </button>

    </form>

    <div class="mt-6 text-center">

        <a href="login.html"
           class="text-purple-400">
            Already have an account?
        </a>

    </div>

</div>

</body>
</html>
