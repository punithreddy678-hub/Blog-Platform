<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Post - BlogSphere AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Quill Editor -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>
body{
    font-family:'Inter',sans-serif;
}
.ql-editor{
    min-height:300px;
}
</style>

</head>

<body class="bg-slate-950 text-white">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 border-r border-slate-800 p-6">

        <h1 class="text-2xl font-bold text-purple-400 mb-10">
            BlogSphere AI
        </h1>

        <nav class="space-y-4">

            <a href="dashboard.html"
               class="block p-3 rounded-xl hover:bg-slate-800">
                Dashboard
            </a>

            <a href="create-post.html"
               class="block bg-purple-600 p-3 rounded-xl">
                Create Post
            </a>

            <a href="#"
               class="block p-3 rounded-xl hover:bg-slate-800">
                My Posts
            </a>

            <a href="#"
               class="block p-3 rounded-xl hover:bg-slate-800">
                Drafts
            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="flex-1 p-8">

        <h2 class="text-4xl font-bold mb-8">
            Create New Post
        </h2>

       <form id="postForm" class="space-y-6">

    <!-- Title -->

    <div>

        <label class="block mb-2 font-semibold">
            Post Title
        </label>

        <input
            id="title"
            type="text"
            placeholder="Enter blog title..."
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

    </div>

    <!-- Category -->

    <div>

        <label class="block mb-2 font-semibold">
            Category
        </label>

        <select
            id="category"
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

            <option>Artificial Intelligence</option>
            <option>Programming</option>
            <option>Business</option>
            <option>Education</option>
            <option>Technology</option>

        </select>

    </div>

    <!-- Tags -->

    <div>

        <label class="block mb-2 font-semibold">
            Tags
        </label>

        <input
            id="tags"
            type="text"
            placeholder="AI, JavaScript, Startup..."
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

    </div>

    <!-- Featured Image -->

    <div>

        <label class="block mb-2 font-semibold">
            Featured Image
        </label>

        <input
            id="image"
            type="file"
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

    </div>

    <!-- Status -->

    <div>

        <label class="block mb-2 font-semibold">
            Post Status
        </label>

        <select
            id="status"
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

            <option value="draft">Draft</option>
            <option value="published">Publish</option>

        </select>

    </div>

    <!-- Excerpt -->

    <div>

        <label class="block mb-2 font-semibold">
            Short Description
        </label>

        <textarea
            id="excerpt"
            rows="4"
            placeholder="Write a short summary..."
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700"></textarea>

    </div>

    <!-- Editor -->

    <div>

        <label class="block mb-4 font-semibold">
            Blog Content
        </label>

        <div
            id="editor"
            class="bg-white text-black rounded-xl">
        </div>

    </div>

    <!-- Buttons -->

    <div class="flex gap-4">

        <button
            type="button"
            class="bg-slate-700 px-8 py-3 rounded-xl">
            Save Draft
        </button>

        <button
            id="publishBtn"
            type="submit"
            class="bg-purple-600 hover:bg-purple-700 px-8 py-3 rounded-xl">
            Publish Post
        </button>

    </div>

</form>

    </main>

</div>

<script>
var quill = new Quill('#editor', {
    theme: 'snow'
});

document
.getElementById("postForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    try {

        const token = localStorage.getItem("token");

        if (!token) {
            alert("Please login first");
            window.location.href = "login.html";
            return;
        }

        let imageUrl = "";

        const imageFile =
            document.getElementById("image").files[0];

        // Upload Image

        if (imageFile) {

            const formData = new FormData();

            formData.append("image", imageFile);

            const uploadResponse =
                await fetch(
                    "http://localhost:5000/api/upload",
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const uploadData =
                await uploadResponse.json();

            imageUrl = uploadData.url;
        }

        // Tags Array

        const tags =
            document
            .getElementById("tags")
            .value
            .split(",")
            .map(tag => tag.trim());

        // Post Data

        const postData = {

            title:
                document.getElementById("title").value,

            content:
                quill.root.innerHTML,

            excerpt:
                document.getElementById("excerpt").value,

            featuredImage:
                imageUrl,

            category:
                document.getElementById("category").value,

            tags,

            status:
                document.getElementById("status").value

        };

        const response = await fetch(
            "http://localhost:5000/api/posts",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    Authorization:
                        `Bearer ${token}`
                },

                body:
                    JSON.stringify(postData)
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("Post Published Successfully");

            window.location.href =
                "blogs.html";

        } else {

            alert(data.message);

        }

    } catch(error){

        console.error(error);

        alert("Failed to create post");

    }

});
</script>

</body>
</html>
